services:
  # ─── PostgreSQL ────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: ze_ticket_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ze_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ze_ticket_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - ze_internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Elasticsearch ─────────────────────────────────────────────
  elasticsearch:
    image: elasticsearch:8.13.4
    container_name: ze_ticket_es
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - ze_internal
    healthcheck:
      test: ["CMD-SHELL", "curl -s -u elastic:${ELASTIC_PASSWORD} http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 30s
      timeout: 30s
      retries: 10
      start_period: 120s

  # ─── FastAPI Backend ────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ze_ticket_backend
    restart: unless-stopped
    env_file: .env
    environment:
      TZ: ${TIMEZONE:-Europe/Berlin}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      ELASTICSEARCH_URL: http://elastic:${ELASTIC_PASSWORD}@elasticsearch:9200
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    networks:
      - ze_internal
    extra_hosts:
      # Mailserver über Host-Gateway erreichbar machen
      - "mail.z-evolutions.de:172.20.0.1"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  # ─── React Frontend (Dev-Server) ───────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ze_ticket_frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - ze_internal
    environment:
      VITE_API_URL: https://support.z-evolutions.de/api

volumes:
  postgres_data:
  redis_data:
  es_data:
  uploads_data:

networks:
  ze_internal:
    driver: bridge
