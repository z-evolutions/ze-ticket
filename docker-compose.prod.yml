# ZE-Ticket — Produktions-Compose
# Unterschiede zu docker-compose.yml:
#   - Kein Frontend-Container (Apache liefert dist/ direkt aus)
#   - Kein ./backend:/app Volume-Mount (Code ist im Image)
#   - APP_ENV=production
#   - Kein --reload im Backend (läuft via entrypoint.sh)

services:
  # ─── PostgreSQL ────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: ze_ticket_db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ze_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ze_ticket_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - ze_internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Elasticsearch ─────────────────────────────────────────────
  elasticsearch:
    image: elasticsearch:8.13.4
    container_name: ze_ticket_es
    restart: always
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - ze_internal
    healthcheck:
      test: ["CMD-SHELL", "curl -s -u elastic:${ELASTIC_PASSWORD} http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 30s
      timeout: 30s
      retries: 10
      start_period: 120s

  # ─── FastAPI Backend ────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ze_ticket_backend
    restart: always
    env_file: .env
    environment:
      TZ: ${TIMEZONE:-Europe/Berlin}
      APP_ENV: production
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: ${REDIS_URL}
      ELASTICSEARCH_URL: http://elastic:${ELASTIC_PASSWORD}@elasticsearch:9200
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - uploads_data:/app/uploads
    networks:
      - ze_internal
    extra_hosts:
      - "mail.z-evolutions.de:172.20.0.1"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  es_data:
  uploads_data:

networks:
  ze_internal:
    driver: bridge
