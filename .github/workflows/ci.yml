name: CI — Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ─── Backend Tests ──────────────────────────────────────────────────────────
  backend:
    name: Backend Tests (pytest)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ze_ticket_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: ze_ticket
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

      elasticsearch:
        image: elasticsearch:8.13.4
        env:
          discovery.type: single-node
          xpack.security.enabled: false
          ES_JAVA_OPTS: -Xms256m -Xmx256m
        options: >-
          --health-cmd "curl -f http://localhost:9200/_cluster/health"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 10
        ports:
          - 9200:9200

    steps:
      - uses: actions/checkout@v4

      - name: Python 3.12 einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements-dev.txt

      - name: Abhängigkeiten installieren
        run: |
          cd backend
          pip install -r requirements-dev.txt

      - name: Test-Datenbank anlegen
        run: |
          PGPASSWORD=test_password psql -h localhost -U ze_ticket_user -d ze_ticket \
            -c "CREATE DATABASE ze_ticket_test OWNER ze_ticket_user;"

      - name: Tests ausführen
        env:
          UPLOAD_DIR: /tmp/ze_ticket_uploads
          DATABASE_URL: postgresql+asyncpg://ze_ticket_user:test_password@localhost:5432/ze_ticket
          REDIS_URL: redis://localhost:6379
          ELASTICSEARCH_URL: http://localhost:9200
          SECRET_KEY: test-secret-key-for-ci-only
          APP_URL: http://localhost:8000
          APP_ENV: test
          SMTP_HOST: localhost
          SMTP_PORT: 587
          SMTP_USER: test@test.de
          SMTP_PASSWORD: test
          SMTP_FROM: test@test.de
          IMAP_HOST: localhost
          IMAP_PORT: 993
          IMAP_USER: test@test.de
          IMAP_PASSWORD: test
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short

  # ─── Frontend Tests ─────────────────────────────────────────────────────────
  frontend:
    name: Frontend Tests (vitest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Abhängigkeiten installieren
        run: |
          cd frontend
          npm ci

      - name: Tests ausführen
        run: |
          cd frontend
          npm test

      - name: Build prüfen
        run: |
          cd frontend
          npm run build

  # ─── Sicherheits-Audit ──────────────────────────────────────────────────────
  security:
    name: Sicherheits-Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: pip-audit ausführen
        run: |
          pip install pip-audit
          pip-audit -r backend/requirements.txt

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: npm audit ausführen
        run: |
          cd frontend
          npm audit --audit-level=high
